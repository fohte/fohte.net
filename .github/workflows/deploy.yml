name: Deploy to Cloudflare Pages

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Create GitHub deployment
        id: deployment
        uses: chrnorm/deployment-action@500aa6a23c81ffa1acf71072aee3cfa2cc2e556a # v2.0.8
        with:
          token: ${{ github.token }}
          environment: ${{ github.ref == 'refs/heads/master' && 'Production' || 'Preview' }}
          environment-url: ${{ github.ref == 'refs/heads/master' && 'https://fohte.net' || null }}
          description: Deploy to Cloudflare Pages
          initial-status: in_progress
          production-environment: ${{ github.ref == 'refs/heads/master' }}
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          install: true

      - run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Astro build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .astro
          key: ${{ runner.os }}-astro-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'astro.config.mjs', '!node_modules/**/*') }}
          restore-keys: |
            ${{ runner.os }}-astro-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-astro-

      - name: Generate embeddings
        if: github.ref != 'refs/heads/master'
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: pnpm run generate:embeddings

      - name: Commit and push embedding changes
        if: github.ref != 'refs/heads/master'
        uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          commit_message: 'chore: update embedding files'
          workflow: deny
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Build
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        id: cloudflare-deployment
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=fohte-net

      - name: Extract deployment URLs
        if: github.ref != 'refs/heads/master'
        id: extract-url
        run: |
          echo "${{ steps.cloudflare-deployment.outputs.command-output }}" > deployment-output.txt
          MAIN_URL=$(grep -o 'Take a peek over at https://[^[:space:]]*\.pages\.dev' deployment-output.txt | sed 's/Take a peek over at //' | head -1)
          ALIAS_URL=$(grep -o 'Deployment alias URL: https://[^[:space:]]*\.pages\.dev' deployment-output.txt | sed 's/Deployment alias URL: //' | head -1)
          echo "main-url=$MAIN_URL" >> "$GITHUB_OUTPUT"
          echo "alias-url=$ALIAS_URL" >> "$GITHUB_OUTPUT"

      - name: Update deployment status
        if: always()
        uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2.0.4
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: ${{ job.status }}
          environment-url: ${{ steps.extract-url.outputs.alias-url || steps.extract-url.outputs.main-url || (github.ref == 'refs/heads/master' && 'https://fohte.net' || '') }}
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
