# yaml-language-server: $schema=https://raw.githubusercontent.com/suzuki-shunsuke/pinact/refs/heads/main/json-schema/pinact.json
# pinact - https://github.com/suzuki-shunsuke/pinact
version: 3

min_age:
  value: 7
  always: true

rules:
  # Owned action; min-age policy targets third-party supply chain risk.
  - conditions:
      - expr: ActionRepoFullName == "fohte/copier-update-action"
    min_age: 0
