remotes:
  - git_url: https://github.com/fohte/lefthook-config.git
    ref: v0.1.16 # renovate: datasource=github-tags depName=fohte/lefthook-config
    configs:
      - base.yml

pre-commit:
  commands:
    eslint:
      glob: '*.{js,ts,jsx,tsx,mjs,cjs,astro}'
      run: pnpm exec astro sync --silent && pnpm exec eslint {staged_files}
