allowBuilds:
  # required by vitest's transformer
  esbuild: true
  # required by @fohte/eslint-config -> eslint-plugin-import-x for "@/*" resolution
  unrs-resolver: true
  # required by Astro/satori for image processing (OG image generation, etc.)
  sharp: true
  # required by wrangler (Cloudflare Pages deploy) which dynamically pulls workerd
  workerd: true

# Dodge short-lived supply-chain attacks (e.g. shai-hulud, tinycolor) by
# holding off freshly published versions. Unit is minutes; 10080 = 7 days.
minimumReleaseAge: 10080
# First-party scopes: publisher account is trusted, so skip the release-age delay.
minimumReleaseAgeExclude:
  - '@fohte/*'
  # Renovate security update: happy-dom@20.8.9
  - happy-dom@20.8.9
  # Renovate security update: astro@6.4.6 || 7.1.0
  - astro@6.4.6 || 7.1.0
  # Renovate security update: sharp@0.35.0
  - sharp@0.35.0
