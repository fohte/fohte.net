allowBuilds:
  # required by vitest's transformer
  esbuild: true
  # required by @fohte/eslint-config -> eslint-plugin-import-x for "@/*" resolution
  unrs-resolver: true
  sharp: true
  # required by wrangler (Cloudflare Pages deploy) which dynamically pulls workerd
  workerd: true

overrides:
  '@types/react': 18.3.28
  '@types/react-dom': 18.3.7
  date-fns: 4.1.0
